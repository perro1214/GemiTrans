<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Page Translator</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- ヘッダー -->
    <header class="header">
      <div class="logo">
        <img src="../icons/icon48.png" alt="icon" class="logo-icon">
        <div>
          <h1 class="title">AI Translator</h1>
          <p class="subtitle">Powered by Gemini</p>
        </div>
      </div>
    </header>

    <!-- 設定セクション -->
    <section class="section" id="settings-section">
      <div class="field">
        <label class="label" for="api-key">
          <span class="label-icon">🔑</span>
          API Key
        </label>
        <div class="input-group">
          <input
            type="password"
            id="api-key"
            class="input"
            placeholder="Gemini API キーを入力..."
            autocomplete="off"
          >
          <button id="toggle-key" class="btn-icon" title="表示/非表示">
            <span id="toggle-icon">👁</span>
          </button>
        </div>
        <div id="key-status" class="key-status hidden"></div>
      </div>

      <div class="field">
        <label class="label" for="target-lang">
          <span class="label-icon">🌐</span>
          翻訳先の言語
        </label>
        <select id="target-lang" class="select">
          <option value="日本語">🇯🇵 日本語</option>
          <option value="English">🇺🇸 English</option>
          <option value="中文">🇨🇳 中文</option>
          <option value="한국어">🇰🇷 한국어</option>
          <option value="Français">🇫🇷 Français</option>
          <option value="Deutsch">🇩🇪 Deutsch</option>
          <option value="Español">🇪🇸 Español</option>
          <option value="Português">🇧🇷 Português</option>
          <option value="Italiano">🇮🇹 Italiano</option>
          <option value="Русский">🇷🇺 Русский</option>
        </select>
      </div>

      <div class="field">
        <label class="label" for="model-select">
          <span class="label-icon">🤖</span>
          モデル
        </label>
        <select id="model-select" class="select">
          <option value="gemini-2.0-flash">Gemini 2.0 Flash（高速）</option>
          <option value="gemini-2.0-flash-lite">Gemini 2.0 Flash Lite（最速）</option>
          <option value="gemini-3.1-flash-lite-preview">Gemini 3.1 Flash Lite Preview</option>
          <option value="gemini-2.5-pro-preview-05-06">Gemini 2.5 Pro（高精度）</option>
        </select>
      </div>

      <div class="field">
        <label class="label" for="batch-size">
          <span class="label-icon">📦</span>
          バッチ許容量
        </label>
        <select id="batch-size" class="select">
          <option value="1500">小（1500文字）— 安定重視</option>
          <option value="3000" selected>中（3000文字）— バランス</option>
          <option value="8000">大（8000文字）— 高速</option>
          <option value="20000">特大（20000文字）— 大容量プラン向け</option>
          <option value="0">無制限 — 最大プラン向け</option>
        </select>
      </div>

      <button id="save-settings" class="btn btn-secondary">
        <span class="btn-text">💾 設定を保存</span>
      </button>

      <div class="field toggle-field">
        <label class="toggle-label" for="auto-translate">
          <span class="label-icon">⚡</span>
          <span>ページを開いた時に自動翻訳</span>
        </label>
        <label class="toggle-switch">
          <input type="checkbox" id="auto-translate">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="field toggle-field">
        <label class="toggle-label" for="verbose-log">
          <span class="label-icon">🔍</span>
          <span>詳細ログ（verbose）</span>
        </label>
        <label class="toggle-switch">
          <input type="checkbox" id="verbose-log">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </section>

    <!-- 翻訳セクション -->
    <section class="section" id="translate-section">
      <div class="divider"></div>

      <button id="translate-btn" class="btn btn-primary" disabled>
        <span class="btn-text">✨ ページを翻訳</span>
      </button>

      <button id="cancel-btn" class="btn btn-danger hidden">
        <span class="btn-text">⏹ キャンセル</span>
      </button>

      <button id="restore-btn" class="btn btn-warning hidden">
        <span class="btn-text">↩️ 原文に戻す</span>
      </button>

      <!-- 進捗バー -->
      <div id="progress-container" class="progress-container hidden">
        <div class="progress-header">
          <span id="progress-text" class="progress-text">翻訳中...</span>
          <span id="progress-percent" class="progress-percent">0%</span>
        </div>
        <div class="progress-bar">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
      </div>

      <!-- ステータスメッセージ -->
      <div id="status-message" class="status-message hidden"></div>
    </section>

    <!-- 使用量セクション -->
    <section class="section" id="usage-section">
      <div class="divider"></div>
      <button id="toggle-usage" class="btn btn-secondary btn-sm">
        <span class="btn-text">📊 使用量を表示</span>
      </button>
      <div id="usage-viewer" class="usage-viewer hidden">
        <div class="usage-header">
          <span class="usage-title">API使用量</span>
          <button id="clear-usage" class="btn-icon btn-icon-sm" title="使用量をリセット">🗑</button>
        </div>
        <div id="usage-content" class="usage-content">
          <p class="usage-empty">使用データがありません</p>
        </div>
      </div>
    </section>

    <!-- ログセクション -->
    <section class="section" id="log-section">
      <div class="divider"></div>
      <button id="toggle-logs" class="btn btn-secondary btn-sm">
        <span class="btn-text">📋 ログを表示</span>
      </button>
      <div id="log-viewer" class="log-viewer hidden">
        <div class="log-header">
          <span class="log-title">開発者ログ</span>
          <button id="clear-logs" class="btn-icon btn-icon-sm" title="ログをクリア">🗑</button>
        </div>
        <div class="log-filters">
          <div class="log-level-filters">
            <label class="log-chip INFO active" title="INFOを表示">
              <input type="checkbox" value="INFO" checked> INFO
            </label>
            <label class="log-chip WARN active" title="WARNを表示">
              <input type="checkbox" value="WARN" checked> WARN
            </label>
            <label class="log-chip ERROR active" title="ERRORを表示">
              <input type="checkbox" value="ERROR" checked> ERROR
            </label>
          </div>
          <div class="log-source-filters">
            <button class="log-src-btn active" data-source="all">全て</button>
            <button class="log-src-btn" data-source="background">BG</button>
            <button class="log-src-btn" data-source="content">CT</button>
          </div>
        </div>
        <div id="log-list" class="log-list">
          <p class="log-empty">ログはありません</p>
        </div>
      </div>
    </section>

    <!-- フッター -->
    <footer class="footer">
      <p>Gemini API を使用したAI翻訳</p>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
